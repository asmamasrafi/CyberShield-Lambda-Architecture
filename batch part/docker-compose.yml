networks:
  bigdata-net:
    driver: bridge

services:

  # ─────────────────────────────────────────
  # HDFS — NameNode
  # ─────────────────────────────────────────
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    restart: unless-stopped
    ports:
      - "9870:9870"   # Web UI HDFS
      - "9000:9000"   # RPC
    environment:
      - CLUSTER_NAME=cyber-cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_replication=1
      - HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check=false
    volumes:
      - namenode_data:/hadoop/dfs/name
    networks:
      - bigdata-net

  # ─────────────────────────────────────────
  # HDFS — DataNode
  # ─────────────────────────────────────────
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    hostname: datanode
    restart: unless-stopped
    ports:
      - "9864:9864"   # Web UI DataNode
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_replication=1
    volumes:
      - datanode_data:/hadoop/dfs/data
    depends_on:
      - namenode
    networks:
      - bigdata-net

  # ─────────────────────────────────────────
  # SPARK — Master
  # ─────────────────────────────────────────
  spark-master:
    image: bde2020/spark-master:3.3.0-hadoop3.3
    container_name: spark-master
    hostname: spark-master
    restart: unless-stopped
    ports:
      - "8080:8080"   # Spark Web UI
      - "7077:7077"   # Spark Master port
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - SPARK_MODE=master
    volumes:
      - ./jobs:/opt/spark-jobs          # Dossier pour vos scripts Spark
      - ./data:/opt/spark-data          # Dossier pour le CSV
    depends_on:
      - namenode
    networks:
      - bigdata-net

  # ─────────────────────────────────────────
  # SPARK — Worker
  # ─────────────────────────────────────────
  spark-worker:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: spark-worker
    hostname: spark-worker
    restart: unless-stopped
    ports:
      - "8081:8081"   # Worker Web UI
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
    depends_on:
      - spark-master
    networks:
      - bigdata-net

  # ─────────────────────────────────────────
  # ZOOKEEPER (requis par HBase)
  # ─────────────────────────────────────────
  zookeeper:
    image: zookeeper:3.7
    container_name: zookeeper
    hostname: zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      - ZOO_MY_ID=1
      - ZOO_SERVERS=server.1=zookeeper:2888:3888;2181
    networks:
      - bigdata-net

  # ─────────────────────────────────────────
  # HBASE — Master (standalone avec ZooKeeper)
  # ─────────────────────────────────────────
  hbase:
    image: harisekhon/hbase:2.1
    container_name: hbase
    hostname: hbase
    restart: unless-stopped
    ports:
      - "16000:16000"   # HBase Master
      - "16010:16010"   # HBase Master Web UI
      - "16020:16020"   # HBase RegionServer
      - "16030:16030"   # HBase RegionServer Web UI
      - "8085:8085"     # HBase REST API
      - "9090:9090"     # HBase Thrift
    environment:
      - HBASE_ZOOKEEPER_QUORUM=zookeeper
      - HBASE_ZOOKEEPER_PROPERTY_CLIENTPORT=2181
    depends_on:
      - zookeeper
    networks:
      - bigdata-net

volumes:
  namenode_data:
  datanode_data:
